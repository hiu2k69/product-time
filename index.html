<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>生产进度管理 PRO</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="icon" type="image/x-icon" href="./Image/time.png">
</head>

<body>
  <div class="shell">
    <div class="header">
      <h1 id="app-title">📦 生产进度管理 PRO</h1>
      <div class="header-right">
        <div class="filter-info" id="filter-info" style="display:none">
          <span id="filter-label"></span>
          <button onclick="clearFilter()" id="btn-clear-filter">✕ 清除</button>
        </div>
        <button class="check-btn" onclick="openCheckModal()" id="btn-check">📋 进度检查</button>
        <button class="lang-btn" onclick="toggleLang()" id="lang-toggle">
          <span class="lang-flag">🇻🇳</span>
          <span id="lang-label">Tiếng Việt</span>
        </button>
        <div class="zoom-btns">
          <button onclick="setZoom('day')" id="z-day" class="active">日</button>
          <button onclick="setZoom('week')" id="z-week">周</button>
          <button onclick="setZoom('month')" id="z-month">月</button>
        </div>
      </div>
    </div>
    <div class="alert-bar" id="alert-bar"></div>
    <div class="chart-panel">
      <div class="chart-wrap"><canvas id="chart"></canvas></div>
    </div>
    <div class="side-panel">
      <div class="form-card">
        <label id="d-form-label">新增产品</label>
        <input id="d-name" oninput="updatePreview('d')">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <select id="d-phase" onchange="updatePreview('d')">
            <option>FS</option>
            <option>EP</option>
            <option>FEP</option>
            <option>PP</option>
            <option>PS</option>
          </select>
          <input type="date" id="d-date" oninput="updatePreview('d')">
        </div>
        <textarea id="d-note" rows="2" placeholder="Ghi chú (tùy chọn)..." oninput="updatePreview('d')"></textarea>
        <div class="preview-box" id="d-preview"></div>
        <button class="btn-add" onclick="doAdd('d')" id="d-btn-add">+ 添加到计划</button>
      </div>
      <div class="list-card">
        <div class="list-tabs">
          <button class="list-tab active" id="tab-active-d" onclick="switchTab('active','d')">
            <span class="tl-active">进行中</span> <span id="cnt-active-d" style="font-size:10px;opacity:.5"></span>
          </button>
          <button class="list-tab" id="tab-hidden-d" onclick="switchTab('hidden','d')">
            <span class="tl-hidden">已隐藏</span> <span id="cnt-hidden-d" style="font-size:10px;opacity:.5"></span>
          </button>
        </div>
        <div class="list-scroll" id="d-list"></div>
      </div>
    </div>
  </div>

  <!-- MOBILE LIST VIEW -->
  <div class="mob-view hidden" id="mob-list-view">
    <div class="list-tabs" style="margin-bottom:10px">
      <button class="list-tab active" id="tab-active-m" onclick="switchTab('active','m')">
        <span class="tl-active">进行中</span> <span id="cnt-active-m" style="font-size:10px;opacity:.5"></span>
      </button>
      <button class="list-tab" id="tab-hidden-m" onclick="switchTab('hidden','m')">
        <span class="tl-hidden">已隐藏</span> <span id="cnt-hidden-m" style="font-size:10px;opacity:.5"></span>
      </button>
    </div>
    <div id="m-list"></div>
  </div>

  <nav class="mob-nav">
    <div class="mob-nav-inner">
      <button class="mob-tab" id="mob-tab-chart" onclick="mobSwitch('chart')">
        <svg viewBox="0 0 24 24">
          <path d="M18 20V10M12 20V4M6 20v-6" />
        </svg>
        <span class="mob-label-chart">图表</span>
      </button>
      <button class="mob-tab active" id="mob-tab-list" onclick="mobSwitch('list')">
        <svg viewBox="0 0 24 24">
          <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" />
        </svg>
        <span class="mob-label-list">列表</span>
      </button>
      <button class="mob-tab" id="mob-tab-add" onclick="openAddModal()">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" />
          <path d="M12 8v8M8 12h8" />
        </svg>
        <span class="mob-label-add">新增</span>
      </button>
      <button class="mob-tab" id="mob-tab-check" onclick="openCheckModal()">
        <svg viewBox="0 0 24 24">
          <path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" />
        </svg>
        <span class="mob-label-check">检查</span>
      </button>
    </div>
  </nav>

  <!-- ADD MODAL (mobile) -->
  <div class="modal-bg" id="add-modal-bg" style="display:none" onclick="if(event.target===this)closeAddModal()">
    <div class="add-modal">
      <button class="modal-close" onclick="closeAddModal()">✕</button>
      <h2 id="p-form-title">新增产品</h2>
      <input id="p-name" oninput="updatePreview('p')">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <select id="p-phase" onchange="updatePreview('p')">
          <option>FS</option>
          <option>EP</option>
          <option>FEP</option>
          <option>PP</option>
          <option>PS</option>
        </select>
        <input type="date" id="p-date" oninput="updatePreview('p')">
      </div>
      <textarea id="p-note" rows="2" placeholder="Ghi chú (tùy chọn)..."></textarea>
      <div class="preview-box" id="p-preview"></div>
      <div class="popup-btns">
        <button class="popup-cancel" onclick="closeAddModal()" id="p-btn-cancel">取消</button>
        <button class="popup-submit" onclick="doAdd('p')" id="p-btn-submit">+ 添加到计划</button>
      </div>
    </div>
  </div>

  <!-- NOTE EDIT MODAL -->
  <div class="modal-bg" id="note-modal-bg" style="display:none" onclick="if(event.target===this)closeNoteModal()">
    <div class="note-modal">
      <button class="modal-close" onclick="closeNoteModal()">✕</button>
      <h2 id="note-modal-title">Cập nhật ghi chú</h2>
      <div class="nm-sub" id="note-modal-sub"></div>
      <textarea id="note-modal-text" maxlength="300" oninput="updateNoteChar()"></textarea>
      <div class="note-char"><span id="note-char-count">0</span>/300</div>
      <div class="popup-btns">
        <button class="popup-cancel" onclick="closeNoteModal()" id="note-btn-cancel">取消</button>
        <button class="popup-submit" onclick="saveNote()" id="note-btn-save">💾 Lưu</button>
      </div>
    </div>
  </div>

  <!-- CHECK MODAL -->
  <div class="modal-bg" id="check-modal-bg" style="display:none" onclick="if(event.target===this)closeCheckModal()">
    <div class="modal">
      <button class="modal-close" onclick="closeCheckModal()">✕</button>
      <h2 id="check-modal-title">📋 生产进度检查</h2>
      <div id="check-modal-body"></div>
    </div>
  </div>

  <!-- EVENT NOTIFICATION DIALOG -->
  <div class="notif-overlay" id="notif-overlay" style="display:none">
    <div class="notif-dialog">
      <div class="notif-header">
        <div class="notif-icon today-icon" id="notif-icon">📅</div>
        <div>
          <div class="notif-title" id="notif-title">Sự kiện hôm nay & sắp tới</div>
          <div class="notif-subtitle" id="notif-sub">Có sự kiện cần chú ý trong 3 ngày tới</div>
        </div>
      </div>
      <div id="notif-body"></div>
      <div class="notif-footer">
        <button class="notif-snooze" onclick="snoozeNotif()" id="notif-snooze-btn">🔕 Nhắc lại sau</button>
        <button class="notif-dismiss" onclick="dismissNotif()" id="notif-dismiss-btn">✓ Đã biết</button>
      </div>
    </div>
  </div>

  <script src="./js/magic.js"></script>
</body>

</html>
