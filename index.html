<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>生产进度管理 PRO</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#0f0c29;color:#fff;min-height:100vh}
    .shell{display:grid;grid-template-columns:1fr 340px;grid-template-rows:auto auto 1fr;gap:12px;padding:12px;height:100vh}
    .header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.12);border-radius:12px}
    .header h1{font-size:15px;font-weight:500}
    .header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .zoom-btns{display:flex;gap:6px}
    .zoom-btns button{font-size:12px;padding:4px 12px;border:.5px solid rgba(255,255,255,.2);border-radius:8px;background:transparent;color:rgba(255,255,255,.6);cursor:pointer}
    .zoom-btns button.active{background:rgba(55,138,221,.25);color:#85b7eb;border-color:#378add}
    .lang-btn{font-size:12px;padding:4px 12px;border:.5px solid rgba(255,255,255,.25);border-radius:8px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.75);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
    .lang-btn:hover{background:rgba(255,255,255,.13)}
    .alert-bar{grid-column:1/-1;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .alert-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:.5px solid transparent;transition:opacity .15s}
    .alert-chip:hover{opacity:.8}
    .chip-over{background:rgba(226,75,74,.18);border-color:rgba(226,75,74,.4);color:#f09595}
    .chip-soon{background:rgba(186,117,23,.18);border-color:rgba(186,117,23,.4);color:#ef9f27}
    .chip-ok{background:rgba(29,158,117,.18);border-color:rgba(29,158,117,.4);color:#5dcaa5}
    .alert-dot{width:7px;height:7px;border-radius:50%}
    .pulse{animation:pulse 1.4s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    .chart-panel{background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.1);border-radius:12px;padding:16px;display:flex;flex-direction:column;overflow:hidden}
    .chart-wrap{flex:1;position:relative;min-height:0}
    .side-panel{display:flex;flex-direction:column;gap:12px;overflow:hidden}
    .form-card{background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.1);border-radius:12px;padding:16px}
    .form-card label{font-size:11px;font-weight:500;color:rgba(255,255,255,.45);letter-spacing:.06em;display:block;margin-bottom:10px}
    .form-card input,.form-card select{width:100%;padding:7px 10px;font-size:13px;border:.5px solid rgba(255,255,255,.15);border-radius:8px;background:rgba(255,255,255,.06);color:#fff;margin-bottom:8px;outline:none}
    .form-card input:focus,.form-card select:focus{border-color:rgba(55,138,221,.6)}
    .form-card select option{background:#1a1a2e;color:#fff}
    .preview-box{background:rgba(0,0,0,.2);border:.5px solid rgba(255,255,255,.1);border-radius:8px;padding:10px;font-size:12px;color:rgba(255,255,255,.5);min-height:56px;margin-bottom:8px}
    .preview-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
    .preview-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .preview-bar{height:7px;border-radius:4px;transition:width .3s;opacity:.8}
    .btn-add{width:100%;padding:9px;font-size:13px;font-weight:500;border:.5px solid #378add;border-radius:8px;background:rgba(55,138,221,.2);color:#85b7eb;cursor:pointer;transition:opacity .15s}
    .btn-add:hover{opacity:.8}
    .list-card{background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.1);border-radius:12px;padding:16px;flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
    .list-tabs{display:flex;gap:4px;margin-bottom:10px;flex-shrink:0;background:rgba(0,0,0,.2);border-radius:8px;padding:3px}
    .list-tab{flex:1;font-size:11px;font-weight:500;padding:5px 4px;border:none;border-radius:6px;background:transparent;color:rgba(255,255,255,.4);cursor:pointer;transition:all .15s;text-align:center}
    .list-tab.active{background:rgba(55,138,221,.25);color:#85b7eb}
    .list-tab.tab-hidden-active{background:rgba(83,74,183,.3);color:#a89ef5}
    .list-scroll{overflow-y:auto;flex:1}
    .list-scroll::-webkit-scrollbar{width:3px}
    .list-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:99px}
    .item-row{display:flex;align-items:flex-start;gap:8px;padding:10px;border-radius:10px;margin-bottom:6px;border:.5px solid rgba(255,255,255,.08);cursor:pointer;transition:background .15s;position:relative}
    .item-row:hover{background:rgba(255,255,255,.06)}
    .item-row.selected{background:rgba(55,138,221,.18);border-color:rgba(55,138,221,.4)}
    .item-row.row-over{border-color:rgba(226,75,74,.5);background:rgba(226,75,74,.07)}
    .item-row.row-soon{border-color:rgba(186,117,23,.5);background:rgba(186,117,23,.07)}
    .item-row.row-over::before,.item-row.row-soon::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:10px 0 0 10px}
    .item-row.row-over::before{background:#E24B4A}
    .item-row.row-soon::before{background:#ef9f27}
    .item-row.row-archived{border-color:rgba(83,74,183,.3);background:rgba(83,74,183,.07);opacity:.9;cursor:default}
    .item-row.row-archived::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#534AB7;border-radius:10px 0 0 10px}
    .item-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px}
    .item-name{font-size:13px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .badge{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500}
    .badge-ok{background:rgba(29,158,117,.2);color:#5dcaa5}
    .badge-soon{background:rgba(186,117,23,.25);color:#ef9f27}
    .badge-over{background:rgba(226,75,74,.25);color:#f09595}
    .badge-done{background:rgba(83,74,183,.25);color:#a89ef5}
    .act-btns{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
    .hide-btn{font-size:10px;padding:2px 7px;border:.5px solid rgba(83,74,183,.5);border-radius:6px;color:#a89ef5;background:transparent;cursor:pointer;opacity:.7;white-space:nowrap}
    .hide-btn:hover{opacity:1}
    .unhide-btn{font-size:10px;padding:2px 7px;border:.5px solid rgba(29,158,117,.4);border-radius:6px;color:#5dcaa5;background:transparent;cursor:pointer;opacity:.7;white-space:nowrap}
    .unhide-btn:hover{opacity:1}
    .del-btn{font-size:10px;padding:2px 7px;border:.5px solid rgba(226,75,74,.4);border-radius:6px;color:#f09595;background:transparent;cursor:pointer;opacity:.6;white-space:nowrap}
    .del-btn:hover{opacity:1}
    .phase-pill{font-size:9px;padding:2px 6px;border-radius:3px;position:relative;cursor:default;transition:transform .1s}
    .phase-pill:hover{transform:scale(1.15)}
    .phase-pill .tip{white-space:pre;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#12103a;border:.5px solid rgba(255,255,255,.22);border-radius:9px;padding:9px 12px;font-size:11px;line-height:1.75;color:rgba(255,255,255,.88);pointer-events:none;opacity:0;transition:opacity .18s;z-index:999;min-width:155px;box-shadow:0 6px 24px rgba(0,0,0,.55)}
    .phase-pill:hover .tip{opacity:1}
    .tip-line-ok{color:#5dcaa5}
    .tip-line-soon{color:#ef9f27}
    .tip-line-over{color:#f09595}
    .tip-divider{border:none;border-top:.5px solid rgba(255,255,255,.12);margin:4px 0}
    .filter-info{font-size:11px;color:rgba(255,255,255,.4);display:flex;align-items:center;gap:6px}
    .filter-info button{font-size:10px;padding:2px 7px;border:.5px solid rgba(255,255,255,.2);border-radius:6px;background:transparent;color:rgba(255,255,255,.5);cursor:pointer}
    .empty-msg{font-size:13px;color:rgba(255,255,255,.3);padding:20px;text-align:center}
    .check-btn{font-size:12px;padding:5px 14px;border:.5px solid rgba(255,255,255,.2);border-radius:8px;background:transparent;color:rgba(255,255,255,.6);cursor:pointer}
    .check-btn:hover{background:rgba(255,255,255,.06)}
    .archive-phases{margin-top:8px;padding:8px 10px;background:rgba(0,0,0,.2);border-radius:8px;border:.5px solid rgba(83,74,183,.2)}
    .archive-phase-label{font-size:10px;color:rgba(255,255,255,.4);margin-bottom:6px;font-weight:500;letter-spacing:.04em}
    .phase-check-row{display:flex;flex-wrap:wrap;gap:8px}
    .phase-check-item{display:flex;align-items:center;gap:4px;cursor:pointer;padding:3px 7px;border-radius:6px;border:.5px solid rgba(255,255,255,.08);transition:background .12s}
    .phase-check-item:hover{background:rgba(255,255,255,.05)}
    .phase-check-item input[type=checkbox]{width:13px;height:13px;accent-color:#7f77dd;cursor:pointer;flex-shrink:0}
    .phase-check-item .ph-label{font-size:11px;font-weight:500}
    .phase-check-item.ph-done{background:rgba(83,74,183,.15);border-color:rgba(83,74,183,.3)}
    .phase-check-item.ph-done .ph-label{text-decoration:line-through;opacity:.6}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:300}
    .modal{background:#1a1635;border:.5px solid rgba(255,255,255,.15);border-radius:16px;padding:24px;width:500px;max-width:95vw;max-height:88vh;overflow-y:auto}
    .modal h2{font-size:15px;font-weight:500;margin-bottom:16px}
    .modal-close{float:right;background:transparent;border:none;color:rgba(255,255,255,.5);font-size:20px;cursor:pointer;line-height:1}
    .check-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:6px;border:.5px solid rgba(255,255,255,.08)}
    .check-row.cr-over{background:rgba(226,75,74,.1);border-color:rgba(226,75,74,.3)}
    .check-row.cr-soon{background:rgba(186,117,23,.1);border-color:rgba(186,117,23,.3)}
    .check-row.cr-ok{background:rgba(29,158,117,.07);border-color:rgba(29,158,117,.2)}
    .check-icon{font-size:16px;flex-shrink:0}
    .check-name{font-size:13px;font-weight:500;flex:1}
    .check-detail{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}
    .check-days{font-size:12px;font-weight:500;white-space:nowrap}
    .section-title{font-size:11px;font-weight:500;color:rgba(255,255,255,.4);letter-spacing:.06em;margin:12px 0 6px}
    .add-modal{background:#1a1635;border:.5px solid rgba(255,255,255,.15);border-radius:16px;padding:20px;width:420px;max-width:95vw}
    .add-modal h2{font-size:14px;font-weight:500;margin-bottom:14px;color:rgba(255,255,255,.8)}
    .add-modal input,.add-modal select{width:100%;padding:10px 12px;font-size:14px;border:.5px solid rgba(255,255,255,.15);border-radius:10px;background:rgba(255,255,255,.06);color:#fff;margin-bottom:10px;outline:none}
    .add-modal input:focus,.add-modal select:focus{border-color:rgba(55,138,221,.6)}
    .add-modal select option{background:#1a1a2e;color:#fff}
    .add-modal .preview-box{margin-bottom:12px}
    .popup-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
    .popup-cancel{padding:10px;font-size:13px;border:.5px solid rgba(255,255,255,.15);border-radius:10px;background:transparent;color:rgba(255,255,255,.5);cursor:pointer}
    .popup-submit{padding:10px;font-size:13px;font-weight:500;border:.5px solid #378add;border-radius:10px;background:rgba(55,138,221,.2);color:#85b7eb;cursor:pointer}
    .popup-submit:hover{opacity:.85}
    .mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#13102e;border-top:.5px solid rgba(255,255,255,.1);z-index:200}
    .mob-nav-inner{display:flex;justify-content:space-around}
    .mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 14px;font-size:10px;color:rgba(255,255,255,.4);background:transparent;border:none;cursor:pointer;transition:color .15s}
    .mob-tab.active{color:#85b7eb}
    .mob-tab svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
    .mob-view{display:none}
    @media(max-width:700px){
      body{overflow:auto;padding-bottom:70px}
      .shell{display:flex;flex-direction:column;height:auto;gap:10px;padding:10px}
      .header{padding:10px 12px}
      .header h1{font-size:13px}
      .check-btn,.lang-btn{font-size:11px;padding:3px 8px}
      .zoom-btns button{font-size:11px;padding:3px 9px}
      .alert-chip{font-size:11px;padding:5px 10px}
      .chart-panel{min-height:240px}
      .chart-wrap{min-height:200px}
      .side-panel{display:none}
      .mob-nav{display:block}
      .mob-view{display:block;padding:12px 10px 0}
      .mob-view.hidden{display:none}
      .modal{width:100%;max-width:100%;border-radius:16px 16px 0 0;position:fixed;bottom:0;left:0;right:0;max-height:88vh}
      .modal-bg{align-items:flex-end}
      .add-modal{width:94vw;border-radius:16px}
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="header">
    <h1 id="app-title">📦 生产进度管理 PRO</h1>
    <div class="header-right">
      <div class="filter-info" id="filter-info" style="display:none">
        <span id="filter-label"></span>
        <button onclick="clearFilter()" id="btn-clear-filter">✕ 清除</button>
      </div>
      <button class="check-btn" onclick="openCheckModal()" id="btn-check">📋 进度检查</button>
      <button class="lang-btn" onclick="toggleLang()" id="lang-toggle">
        <span class="lang-flag">🇻🇳</span>
        <span id="lang-label">Tiếng Việt</span>
      </button>
      <div class="zoom-btns">
        <button onclick="setZoom('day')" id="z-day" class="active">日</button>
        <button onclick="setZoom('week')" id="z-week">周</button>
        <button onclick="setZoom('month')" id="z-month">月</button>
      </div>
    </div>
  </div>
  <div class="alert-bar" id="alert-bar"></div>
  <div class="chart-panel">
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>
  <div class="side-panel">
    <div class="form-card">
      <label id="d-form-label">新增产品</label>
      <input id="d-name" oninput="updatePreview('d')">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <select id="d-phase" onchange="updatePreview('d')"><option>FS</option><option>EP</option><option>FEP</option><option>PP</option><option>PS</option></select>
        <input type="date" id="d-date" oninput="updatePreview('d')">
      </div>
      <div class="preview-box" id="d-preview"></div>
      <button class="btn-add" onclick="doAdd('d')" id="d-btn-add">+ 添加到计划</button>
    </div>
    <div class="list-card">
      <div class="list-tabs">
        <button class="list-tab active" id="tab-active-d" onclick="switchTab('active','d')">
          <span class="tl-active">进行中</span> <span id="cnt-active-d" style="font-size:10px;opacity:.5"></span>
        </button>
        <button class="list-tab" id="tab-hidden-d" onclick="switchTab('hidden','d')">
          <span class="tl-hidden">已隐藏</span> <span id="cnt-hidden-d" style="font-size:10px;opacity:.5"></span>
        </button>
      </div>
      <div class="list-scroll" id="d-list"></div>
    </div>
  </div>
</div>

<!-- MOBILE LIST VIEW -->
<div class="mob-view hidden" id="mob-list-view">
  <div class="list-tabs" style="margin-bottom:10px">
    <button class="list-tab active" id="tab-active-m" onclick="switchTab('active','m')">
      <span class="tl-active">进行中</span> <span id="cnt-active-m" style="font-size:10px;opacity:.5"></span>
    </button>
    <button class="list-tab" id="tab-hidden-m" onclick="switchTab('hidden','m')">
      <span class="tl-hidden">已隐藏</span> <span id="cnt-hidden-m" style="font-size:10px;opacity:.5"></span>
    </button>
  </div>
  <div id="m-list"></div>
</div>

<nav class="mob-nav">
  <div class="mob-nav-inner">
    <button class="mob-tab" id="mob-tab-chart" onclick="mobSwitch('chart')">
      <svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      <span class="mob-label-chart">图表</span>
    </button>
    <button class="mob-tab active" id="mob-tab-list" onclick="mobSwitch('list')">
      <svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
      <span class="mob-label-list">列表</span>
    </button>
    <button class="mob-tab" id="mob-tab-add" onclick="openAddModal()">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
      <span class="mob-label-add">新增</span>
    </button>
    <button class="mob-tab" id="mob-tab-check" onclick="openCheckModal()">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span class="mob-label-check">检查</span>
    </button>
  </div>
</nav>

<div class="modal-bg" id="add-modal-bg" style="display:none" onclick="if(event.target===this)closeAddModal()">
  <div class="add-modal">
    <button class="modal-close" onclick="closeAddModal()">✕</button>
    <h2 id="p-form-title">新增产品</h2>
    <input id="p-name" oninput="updatePreview('p')">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <select id="p-phase" onchange="updatePreview('p')"><option>FS</option><option>EP</option><option>FEP</option><option>PP</option><option>PS</option></select>
      <input type="date" id="p-date" oninput="updatePreview('p')">
    </div>
    <div class="preview-box" id="p-preview"></div>
    <div class="popup-btns">
      <button class="popup-cancel" onclick="closeAddModal()" id="p-btn-cancel">取消</button>
      <button class="popup-submit" onclick="doAdd('p')" id="p-btn-submit">+ 添加到计划</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="check-modal-bg" style="display:none" onclick="if(event.target===this)closeCheckModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeCheckModal()">✕</button>
    <h2 id="check-modal-title">📋 生产进度检查</h2>
    <div id="check-modal-body"></div>
  </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbzyAAK-Su1xJv4CQ9GSiLYKhkG6UQN7oGaHO_mpzI3poStDs0O9mNhUzczqER8kk-5l_A/exec";
const PHASES=["FS","EP","FEP","PP","PS"];
const PHASE_COLORS={FS:"#378ADD",EP:"#1D9E75",FEP:"#BA7517",PP:"#D4537E",PS:"#534AB7"};
const PHASE_DAYS={FS:7,EP:10,FEP:14,PP:7,PS:5};
let chart,rawData=[],currentFilter=null,currentUnit='day',statusFilter=null,lang='zh';
let listTab={d:'active',m:'active'};
let hiddenStore={};
try{ hiddenStore=JSON.parse(localStorage.getItem('hiddenItems')||'{}'); }catch(e){}
function saveStore(){ try{localStorage.setItem('hiddenItems',JSON.stringify(hiddenStore));}catch(e){} }

const T={
  zh:{
    appTitle:'📦 生产进度管理 PRO',btnCheck:'📋 进度检查',langLabel:'Tiếng Việt',langFlag:'🇻🇳',
    clearFilter:'✕ 清除',filterPrefix:'筛选：',formLabel:'新增产品',namePlaceholder:'产品名称...',
    btnAdd:'+ 添加到计划',tabActive:'进行中',tabHidden:'已隐藏',listTotal:'共{n}个',
    previewEmpty:'填写信息以预览预计进度...',previewDays:'预计{n}天',previewEnd:'预计结束：',
    mobChart:'图表',mobList:'列表',mobAdd:'新增',mobCheck:'检查',
    popupTitle:'新增产品',popupCancel:'取消',popupSubmit:'+ 添加到计划',
    checkTitle:'📋 生产进度检查',alertOver:'逾期 ',alertSoon:'即将 ',alertOk:'正常 ',overRate:'逾期率',
    badgeOver:'逾期{n}天',badgeSoon:'剩{n}天',badgeOk:'正常',badgeDone:'已完成',
    hideBtn:'隐藏',unhideBtn:'恢复',delBtn:'删除',
    emptyMsg:'暂无数据',emptyFiltered:'无符合条件的产品',emptyHidden:'暂无隐藏产品',noData:'暂无产品数据',

async function load(){
  try{ let r=await fetch(API); rawData=await r.json(); rawData.sort((a,b)=>new Date(a.date)-new Date(b.date)); }
  catch(e){ rawData=[]; }
  renderAll();
}
function renderAll(){ renderAlertBar(); renderPanel('d'); renderPanel('m'); drawChart(); }

async function doAdd(prefix){
  let name=document.getElementById(prefix+'-name').value.trim();
  let phase=document.getElementById(prefix+'-phase').value;
  let date=document.getElementById(prefix+'-date').value;
  if(!name||!date){ alert(t('alertMsg')); return; }
  let form=new URLSearchParams();
  form.append("action","create"); form.append("name",name); form.append("phase",phase); form.append("date",date);
  try{ await fetch(API,{method:"POST",body:form}); }catch(e){}
  document.getElementById(prefix+'-name').value='';
  document.getElementById(prefix+'-date').value='';
  document.getElementById(prefix+'-preview').innerHTML='<span>'+t('previewEmpty')+'</span>';
  if(prefix==='p') closeAddModal();
  load();
}

function isHidden(name){ return !!(hiddenStore[name]&&hiddenStore[name].hidden); }
function hideItem(name){
  if(!hiddenStore[name]) hiddenStore[name]={completedPhases:{}};
  hiddenStore[name].hidden=true;
  saveStore(); renderAll();
}
function unhideItem(name){
  if(hiddenStore[name]) hiddenStore[name].hidden=false;
  saveStore(); renderAll();
}
function togglePhaseComplete(name,phase,checked){
  if(!hiddenStore[name]) hiddenStore[name]={hidden:true,completedPhases:{}};
  if(!hiddenStore[name].completedPhases) hiddenStore[name].completedPhases={};
  hiddenStore[name].completedPhases[phase]=checked;
  saveStore();
  // Re-render just the archive section badge without full refresh
  renderPanel('d'); renderPanel('m');
}
function deleteHiddenItem(name){
  delete hiddenStore[name];
  saveStore();
  let idx=rawData.findIndex(o=>o.name===name);
  if(idx!==-1){
    let form=new URLSearchParams(); form.append("action","delete"); form.append("index",idx);
    try{ fetch(API,{method:"POST",body:form}); }catch(e){}
    load();
  } else { renderAll(); }
}

function getGroups(data){ let g={}; data.forEach(o=>{ if(!g[o.name]) g[o.name]=[]; g[o.name].push(o); }); return g; }
function getStatus(ds){
  let td=new Date(); td.setHours(0,0,0,0); let d=new Date(ds); let df=(d-td)/86400000;
  if(df<0) return {st:'over',diff:Math.abs(Math.floor(df))};
  if(df<=3) return {st:'soon',diff:Math.ceil(df)};
  return {st:'ok',diff:Math.ceil(df)};
}
function fmtDate(d){ return new Date(d).toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'}); }
function fmtFull(d){ return new Date(d).toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'}); }
function sortNames(names,groups){
  return [...names].sort((a,b)=>{
    let pa=groups[a]?[...groups[a]].sort((x,y)=>new Date(x.date)-new Date(y.date)):[];
    let pb=groups[b]?[...groups[b]].sort((x,y)=>new Date(x.date)-new Date(y.date)):[];
    let o={over:0,soon:1,ok:2};
    let sa=pa.length?getStatus(pa[pa.length-1].date).st:'ok';
    let sb=pb.length?getStatus(pb[pb.length-1].date).st:'ok';
    return o[sa]-o[sb];
  });
}
function getPhaseRange(phases,p){
  let found=phases.find(x=>x.phase===p); if(!found) return null;
  let startD=new Date(found.date);
  let nx=phases.find(x=>PHASES.indexOf(x.phase)>PHASES.indexOf(p));
  let endD=nx?new Date(nx.date):(()=>{ let e=new Date(startD); e.setDate(e.getDate()+PHASE_DAYS[p]); return e; })();
  return {startD,endD,days:Math.round((endD-startD)/86400000)};
}
function esc(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function renderAlertBar(){
  let groups=getGroups(rawData),over=0,soon=0,ok=0;
  Object.keys(groups).forEach(n=>{
    if(isHidden(n)) return;
    let ph=[...groups[n]].sort((a,b)=>new Date(a.date)-new Date(b.date));
    let {st}=getStatus(ph[ph.length-1].date);
    if(st==='over') over++; else if(st==='soon') soon++; else ok++;
  });
  let total=over+soon+ok;
  let bar=document.getElementById('alert-bar');
  if(!total){ bar.innerHTML=''; return; }
  bar.innerHTML=`
    ${over>0?`<div class="alert-chip chip-over" onclick="filterStatus('over')"><div class="alert-dot pulse" style="background:#E24B4A"></div>${t('alertOver')}${over}</div>`:''}
    ${soon>0?`<div class="alert-chip chip-soon" onclick="filterStatus('soon')"><div class="alert-dot pulse" style="background:#ef9f27"></div>${t('alertSoon')}${soon}</div>`:''}
    ${ok>0?`<div class="alert-chip chip-ok"><div class="alert-dot" style="background:#5dcaa5"></div>${t('alertOk')}${ok}</div>`:''}
    <div style="margin-left:auto;font-size:11px;color:rgba(255,255,255,.35)">${t('overRate')} <span style="color:${over>0?'#f09595':'rgba(255,255,255,.35)'}">${Math.round(over/total*100)}%</span></div>`;
}
function filterStatus(st){ statusFilter=st; renderPanel('d'); renderPanel('m'); }

function buildPills(phases){
  return PHASES.map(p=>{
    let found=phases.find(x=>x.phase===p);
    let col=found?PHASE_COLORS[p]:'transparent';
    let tc=found?PHASE_COLORS[p]:'rgba(255,255,255,.22)';
    let bc=found?PHASE_COLORS[p]:'rgba(255,255,255,.1)';
    let tipHtml='';
    if(found){
      let rng=getPhaseRange(phases,p);
      let {st:ps}=getStatus(rng.endD.toISOString().split('T')[0]);
      let sc=ps==='over'?'tip-line-over':ps==='soon'?'tip-line-soon':'tip-line-ok';
      let stTxt=ps==='over'?t('tipOver'):ps==='soon'?t('tipSoon'):t('tipOk');
      tipHtml=`<span class="tip"><span style="font-weight:600;font-size:12px;color:${PHASE_COLORS[p]}">${p}${t('tipPhase')}</span>\n<hr class="tip-divider">${t('tipStart')}${fmtFull(rng.startD)}\n${t('tipEnd')}${fmtFull(rng.endD)}\n${t('tipDays')}${rng.days}${t('tipDaysUnit')}\n<span class="${sc}">${stTxt}</span></span>`;
    } else {
      tipHtml=`<span class="tip"><span style="color:rgba(255,255,255,.5)">${p}${t('tipPhase')}</span>\n<hr class="tip-divider"><span style="color:rgba(255,255,255,.35)">${t('tipNotPlanned')}</span></span>`;
    }
    return `<span class="phase-pill" style="background:${col}22;color:${tc};border:.5px solid ${bc}">${p}${tipHtml}</span>`;
  }).join('');
}

function buildActiveHTML(names,groups){
  let visible=names.filter(n=>!isHidden(n));
  if(!visible.length) return `<div class="empty-msg">${t('emptyMsg')}</div>`;
  let html='',any=false;
  visible.forEach(name=>{
    let phases=[...groups[name]].sort((a,b)=>new Date(a.date)-new Date(b.date));
    let last=phases[phases.length-1];
    let {st,diff}=getStatus(last.date);
    if(statusFilter&&st!==statusFilter) return;
    if(currentFilter&&name!==currentFilter) return;
    any=true;
    let bCls=st==='over'?'badge-over':st==='soon'?'badge-soon':'badge-ok';
    let bTxt=st==='over'?t('badgeOver',diff):st==='soon'?t('badgeSoon',diff):t('badgeOk');
    let rCls=st==='over'?'row-over':st==='soon'?'row-soon':'';
    let sel=currentFilter===name;
    let pct=Math.round(phases.length/PHASES.length*100);
    let barCol=st==='over'?'#E24B4A':st==='soon'?'#ef9f27':PHASE_COLORS[last.phase];
    let icon=st==='over'?'🔴':st==='soon'?'🟡':'🟢';
    html+=`<div class="item-row ${rCls}${sel?' selected':''}" onclick="filterBy('${esc(name)}')">
      <div class="item-dot" style="background:${PHASE_COLORS[last.phase]||'#888'}"></div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
          <span style="font-size:13px">${icon}</span>
          <span class="item-name">${name}</span>
          <span class="badge ${bCls}">${bTxt}</span>
        </div>
        <div style="display:flex;gap:4px;margin-bottom:5px;flex-wrap:wrap">${buildPills(phases)}</div>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:99px">
            <div style="width:${pct}%;height:4px;background:${barCol};border-radius:99px"></div>
          </div>
          <span style="font-size:10px;color:rgba(255,255,255,.4);min-width:28px;text-align:right">${pct}%</span>
        </div>
      </div>
      <div class="act-btns">
        <button class="hide-btn" onclick="event.stopPropagation();hideItem('${esc(name)}')">${t('hideBtn')}</button>
      </div>
    </div>`;
  });
  return any?html:`<div class="empty-msg">${t('emptyFiltered')}</div>`;
}

function buildHiddenHTML(hiddenNames,groups){
  if(!hiddenNames.length) return `<div class="empty-msg">${t('emptyHidden')}</div>`;
  let html='';
  hiddenNames.forEach(name=>{
    let phases=groups[name]?[...groups[name]].sort((a,b)=>new Date(a.date)-new new Date(b.date)):[];
    let last=phases.length?phases[phases.length-1]:null;
    let pct=phases.length?Math.round(phases.length/PHASES.length*100):0;
    let cp=(hiddenStore[name]&&hiddenStore[name].completedPhases)||{};
    let doneCount=Object.values(cp).filter(Boolean).length;
    let allDone=doneCount===PHASES.length;
    let doneBadge=allDone
      ?`<span class="badge badge-done">${t('badgeDone')}</span>`
      :doneCount>0
        ?`<span class="badge" style="background:rgba(83,74,183,.2);color:#a89ef5">${doneCount}/${PHASES.length}</span>`:'';
    let checkboxes=PHASES.map(ph=>{
      let hasPh=phases.find(x=>x.phase===ph);
      let isDone=!!cp[ph];
      let col=hasPh?PHASE_COLORS[ph]:'rgba(255,255,255,.25)';
      return `<label class="phase-check-item${isDone?' ph-done':''}" onclick="event.stopPropagation()">
        <input type="checkbox" ${isDone?'checked':''} onchange="togglePhaseComplete('${esc(name)}','${ph}',this.checked)">
        <span class="ph-label" style="color:${col}">${ph}</span>
      </label>`;
    }).join('');
    html+=`<div class="item-row row-archived">
      <div class="item-dot" style="background:#534AB7"></div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap">
          <span style="font-size:13px">📦</span>
          <span class="item-name">${name}</span>
          ${doneBadge}
        </div>
        ${last?`<div style="font-size:10px;color:rgba(255,255,255,.35);margin-bottom:7px">${last.phase} &nbsp;·&nbsp; ${fmtFull(last.date)} &nbsp;·&nbsp; ${pct}%</div>`:''}
        <div class="archive-phases">
          <div class="archive-phase-label">${t('archiveTitle')}</div>
          <div class="phase-check-row">${checkboxes}</div>
        </div>
      </div>
      <div class="act-btns">
        <button class="unhide-btn" onclick="event.stopPropagation();unhideItem('${esc(name)}')">${t('unhideBtn')}</button>
        <button class="del-btn" onclick="event.stopPropagation();deleteHiddenItem('${esc(name)}')">${t('delBtn')}</button>
      </div>
    </div>`;
  });
  return html;
}

function renderPanel(panel){
  let groups=getGroups(rawData);
  let activeNames=sortNames(Object.keys(groups).filter(n=>!isHidden(n)),groups);
  let hiddenNames=Object.keys(hiddenStore).filter(n=>hiddenStore[n]&&hiddenStore[n].hidden);
  let ac=activeNames.length, hc=hiddenNames.length;

  document.querySelectorAll(`#cnt-active-${panel}`).forEach(el=>el.textContent=ac||'');
  document.querySelectorAll(`#cnt-hidden-${panel}`).forEach(el=>el.textContent=hc||'');

  let listId=panel==='d'?'d-list':'m-list';
  let el=document.getElementById(listId);
  if(!el) return;
  el.innerHTML=listTab[panel]==='active'
    ? buildActiveHTML(activeNames,groups)
    : buildHiddenHTML(hiddenNames,groups);

  if(panel==='d'){
    let fi=document.getElementById('filter-info'),fl=document.getElementById('filter-label');
    if(fi&&fl){ if(currentFilter){fi.style.display='flex';fl.textContent=t('filterPrefix')+currentFilter;}else{fi.style.display='none';} }
  }
}

function updatePreview(prefix){
  let name=document.getElementById(prefix+'-name').value.trim();
  let selPh=document.getElementById(prefix+'-phase').value;
  let dateVal=document.getElementById(prefix+'-date').value;
  let box=document.getElementById(prefix+'-preview');
  if(!name||!dateVal){ box.innerHTML='<span>'+t('previewEmpty')+'</span>'; return; }
  let si=PHASES.indexOf(selPh),rem=PHASES.slice(si);
  let total=rem.reduce((s,p)=>s+PHASE_DAYS[p],0);
  let today=new Date(); today.setHours(0,0,0,0);
  let cur=new Date(dateVal); cur.setHours(0,0,0,0);
  let end=new Date(cur); end.setDate(end.getDate()+total);
  let html=`<div style="font-size:11px;font-weight:500;margin-bottom:7px;color:rgba(255,255,255,.8)">${name} — ${t('previewDays',total)}</div>`;
  let d=new Date(cur);
  let dUnit=lang==='vi'?' ngày':'天';
  rem.forEach(ph=>{
    let s=new Date(d),e=new Date(d); e.setDate(e.getDate()+PHASE_DAYS[ph]);
    let ov=(e<today),bw=Math.round((PHASE_DAYS[ph]/total)*100),col=ov?'#E24B4A':PHASE_COLORS[ph];
    html+=`<div class="preview-row">
      <div class="preview-dot" style="background:${col}"></div>
      <span style="width:30px;font-size:10px;font-weight:500;color:${col}">${ph}</span>
      <div class="preview-bar" style="width:${bw}%;background:${col}"></div>
      <span style="font-size:10px;color:rgba(255,255,255,.4);margin-left:4px;white-space:nowrap">${fmtDate(s)}–${fmtDate(e)} (${PHASE_DAYS[ph]}${dUnit})</span>
    </div>`;
    d=new Date(e);
  });
  html+=`<div style="font-size:10px;color:rgba(255,255,255,.35);margin-top:6px">${t('previewEnd')}${fmtFull(end)}</div>`;
  box.innerHTML=html;
}

      <span>${t('sumTotal')}<b style="color:#fff">${total}</b></span>
      <span>${t('sumOver')}<b style="color:#f09595">${over.length}</b></span>
      <span>${t('sumSoon')}<b style="color:#ef9f27">${soon.length}</b></span>
      <span>${t('sumOk')}<b style="color:#5dcaa5">${ok.length}</b></span>
      <span>${t('sumRate')}<b style="color:${or2>30?'#f09595':or2>10?'#ef9f27':'#5dcaa5'}">${or2}%</b></span>
    </div>
  </div>`;
  document.getElementById('check-modal-body').innerHTML=html;
  document.getElementById('check-modal-bg').style.display='flex';
}
function closeCheckModal(){ document.getElementById('check-modal-bg').style.display='none'; }

function filterBy(name){ currentFilter=(currentFilter===name)?null:name; statusFilter=null; renderPanel('d'); renderPanel('m'); drawChart(); }
function clearFilter(){ currentFilter=null; statusFilter=null; renderPanel('d'); renderPanel('m'); drawChart(); }
function setZoom(u){
  currentUnit=u;
  ['day','week','month'].forEach(x=>document.getElementById('z-'+x).classList.remove('active'));
  document.getElementById('z-'+u).classList.add('active');
  drawChart();
}

function drawChart(){
  if(chart){ chart.destroy(); chart=null; }
  let ex=Chart.getChart('chart'); if(ex) ex.destroy();
  let data=rawData.filter(o=>!isHidden(o.name));
  if(currentFilter) data=data.filter(o=>o.name===currentFilter);
  let groups=getGroups(data);
  let labels=sortNames(Object.keys(groups),groups);
  if(!labels.length) return;
  let today=new Date(); today.setHours(0,0,0,0);
  let minDate=new Date(today.getFullYear(),today.getMonth(),1);
  let mob=window.innerWidth<=700;
  let datasets=[];
  PHASES.forEach(phase=>{
    let arr=[],bgColors=[];
    labels.forEach(name=>{
      let phases=[...groups[name]].sort((a,b)=>new Date(a.date)-new Date(b.date));
      let idx=phases.findIndex(p=>p.phase===phase);
      if(idx!==-1){
        let start=new Date(phases[idx].date);
        let end=idx<phases.length-1?new Date(phases[idx+1].date):(()=>{ let e=new Date(start); e.setDate(e.getDate()+2); return e; })();
        let {st}=getStatus(end.toISOString().split('T')[0]);
        let color=st==='over'?'#E24B4A':st==='soon'?'#ef9f27':PHASE_COLORS[phase];
        arr.push({x:[start,end],y:name}); bgColors.push(color);
      } else { arr.push({x:[new Date(0),new Date(0)],y:name}); bgColors.push('transparent'); }
    });
    datasets.push({label:phase,data:arr,backgroundColor:bgColors,borderRadius:4,borderSkipped:false});
  });
  let ctx=document.getElementById('chart').getContext('2d');
  chart=new Chart(ctx,{
    type:'bar',data:{labels,datasets},
    options:{
      indexAxis:'y',maintainAspectRatio:false,
      parsing:{xAxisKey:'x',yAxisKey:'y'},
      scales:{
        x:{type:'time',min:minDate,time:{unit:currentUnit},ticks:{color:'rgba(255,255,255,.5)',font:{size:mob?9:11},maxRotation:0},grid:{color:'rgba(255,255,255,.06)'}},
        y:{stacked:true,ticks:{color:(c)=>{
          let n=c.tick.label,g=getGroups(data);
          if(!g[n]) return 'rgba(255,255,255,.8)';
          let ph=[...g[n]].sort((a,b)=>new Date(a.date)-new Date(b.date));
          let {st}=getStatus(ph[ph.length-1].date);
          return st==='over'?'#f09595':st==='soon'?'#ef9f27':'rgba(255,255,255,.8)';
        },font:{size:mob?10:12}},grid:{display:false}}
      },
      plugins:{
        legend:{labels:{color:'rgba(255,255,255,.6)',font:{size:mob?9:11},boxWidth:8,boxHeight:8}},
        tooltip:{callbacks:{label:(c)=>{
          let d=c.raw;
          if(!d||!d.x||new Date(d.x[0]).getFullYear()===1970) return '';
          let s=new Date(d.x[0]),e=new Date(d.x[1]);
          let days=Math.round((e-s)/86400000);
          let toEnd=Math.round((e-new Date())/86400000);
          let dSfx=lang==='vi'?' ngày':'天';
          return [
            `${c.dataset.label}：${fmtFull(s)} ${t('tooltipFrom')} ${fmtFull(e)}（${days}${dSfx}）`,
            toEnd>=0?`${t('tooltipLeft')}${toEnd}${dSfx}`:`${t('tooltipOverdue')}${Math.abs(toEnd)}${dSfx}`
          ];
        }}}
      },
      onClick:(e,els)=>{ if(els.length) filterBy(labels[els[0].index]); }
    }
  });
}
window.onload=()=>{ applyLangUI(); load(); if(window.innerWidth<=700){ mobSwitch('list'); } };
window.addEventListener('resize',()=>{ drawChart(); });
</script>
